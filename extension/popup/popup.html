<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 22px; }
    .title { font-size: 14px; font-weight: 600; color: #111827; }
    .sub   { font-size: 11px; color: #9ca3af; margin-top: 1px; }
    .section { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    .label { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .stat-val { font-size: 15px; font-weight: 600; color: #111827; }
    .stat-key { font-size: 12px; color: #6b7280; }
    .btn {
      display: block; width: 100%; padding: 8px 12px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 13px; color: #374151;
      cursor: pointer; text-align: left; margin-bottom: 6px;
      transition: background .15s;
    }
    .btn:hover { background: #f3f4f6; }
    .btn.danger { color: #dc2626; border-color: #fecaca; background: #fff; }
    .btn.danger:hover { background: #fef2f2; }
    .footer { padding: 10px 16px; font-size: 11px; color: #d1d5db; text-align: center; }
    #status { padding: 8px 16px; font-size: 12px; color: #166534; background: #f0fdf4; border-top: 1px solid #bbf7d0; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡️</div>
    <div>
      <div class="title">Guardian Overlay</div>
      <div class="sub">T&amp;C Risk Analyzer</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Cache Stats</div>
    <div class="stat-row">
      <span class="stat-key">URLs analyzed</span>
      <span class="stat-val" id="url-count">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">Unique documents</span>
      <span class="stat-val" id="hash-count">—</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Actions</div>
    <button class="btn" id="btn-analyze">🔍 Re-analyze current tab</button>
    <button class="btn danger" id="btn-clear">🗑️ Clear all cached results</button>
  </div>

  <div id="status"></div>

  <div class="footer">Guardian v1.0 · Powered by Claude</div>

  <script src="popup.js"></script>
</body>
</html>
